name: ShellCheck

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Limit permissions for security
permissions:
  contents: read
  pull-requests: write

jobs:
  shellcheck:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run ShellCheck on deploy scripts
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # master
        with:
          scandir: './deploy'
          severity: warning

      - name: Run ShellCheck on utility scripts
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # master
        with:
          scandir: './scripts'
          severity: warning
