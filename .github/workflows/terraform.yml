name: Terraform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Limit permissions for security
permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-format:
    name: Terraform Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.2.1
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive infra/terraform/

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [prod]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.2.1
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init (backend=false)
        working-directory: infra/terraform/envs/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra/terraform/envs/${{ matrix.environment }}
        run: terraform validate

  module-validate:
    name: Validate Terraform Module
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.2.1
        with:
          terraform_version: "1.7.0"

      - name: Init hetzner-vps module
        working-directory: infra/terraform/modules/hetzner-vps
        run: terraform init -backend=false

      - name: Validate hetzner-vps module
        working-directory: infra/terraform/modules/hetzner-vps
        run: terraform validate
